<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Station IPB</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }
    #map { width: 100%; height: 100vh; }

    /* Panel info */
    #panel {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      min-width: 280px;
      text-align: center;
    }
    #panel h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    #panel p {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    #btn-find {
      background: #1D9E75;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    #btn-find:hover { background: #0F6E56; }
    #btn-find:disabled { background: #aaa; cursor: not-allowed; }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #444;
      min-height: 16px;
    }

    /* Info box nearest station */
    #info-box {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      border-radius: 12px;
      padding: 12px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      min-width: 260px;
      display: none;
    }
    #info-box h3 { font-size: 14px; color: #1D9E75; margin-bottom: 4px; }
    #info-box p  { font-size: 13px; color: #444; }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 20px; right: 10px;
      z-index: 1000;
      background: white;
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      font-size: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="panel">
  <h2>Water Station — IPB University</h2>
  <p>Temukan stasiun air terdekat dari lokasi Anda</p>
  <button id="btn-find" onclick="findNearest()">Cari Stasiun Terdekat</button>
  <div id="status">Klik tombol untuk mengaktifkan GPS</div>
</div>

<div id="info-box">
  <h3 id="info-name"></h3>
  <p id="info-dist"></p>
  <p id="info-addr" style="color:#888; font-size:11px; margin-top:4px;"></p>
</div>

<div id="legend">
  <div class="legend-item"><div class="dot" style="background:#1D9E75;"></div> Water Station</div>
  <div class="legend-item"><div class="dot" style="background:#185FA5;"></div> Lokasi Anda</div>
  <div class="legend-item"><div class="dot" style="background:#D85A30;"></div> Terdekat</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
  // ============================================================
  // KONFIGURASI WATER STATIONS DI KAMPUS IPB DRAMAGA
  // Koordinat: [latitude, longitude]
  // Sesuaikan nama & koordinat dengan lokasi nyata di lapangan
  // ============================================================
  const waterStations = [
    { name: "Water Station Rektorat",       lat: -6.5593, lng: 106.7249, addr: "Gedung Rektorat IPB" },
    { name: "Water Station Faperta",        lat: -6.5560, lng: 106.7215, addr: "Fak. Pertanian" },
    { name: "Water Station FMIPA",          lat: -6.5541, lng: 106.7268, addr: "Fak. MIPA IPB" },
    { name: "Water Station FKH",            lat: -6.5520, lng: 106.7300, addr: "Fak. Kedokteran Hewan" },
    { name: "Water Station Fahutan",        lat: -6.5610, lng: 106.7280, addr: "Fak. Kehutanan" },
    { name: "Water Station Graha Widya",    lat: -6.5580, lng: 106.7320, addr: "Graha Widya Wisuda" },
    { name: "Water Station Gymnasium",      lat: -6.5555, lng: 106.7240, addr: "Gymnasium IPB" },
  ];

  // ============================================================
  // INISIALISASI PETA — Center: IPB Dramaga
  // ============================================================
  const map = L.map('map').setView([-6.5588, 106.7262], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  // ============================================================
  // CUSTOM ICONS
  // ============================================================
  const stationIcon = L.divIcon({
    className: '',
    html: `<div style="
      background:#1D9E75; color:white; border-radius:50%;
      width:32px; height:32px; display:flex; align-items:center;
      justify-content:center; font-size:16px; font-weight:bold;
      border:3px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3);">
      &#x1F4A7;
    </div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -18]
  });

  const nearestIcon = L.divIcon({
    className: '',
    html: `<div style="
      background:#D85A30; color:white; border-radius:50%;
      width:36px; height:36px; display:flex; align-items:center;
      justify-content:center; font-size:18px;
      border:3px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.4);">
      &#x2605;
    </div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -20]
  });

  const userIcon = L.divIcon({
    className: '',
    html: `<div style="
      background:#185FA5; color:white; border-radius:50%;
      width:28px; height:28px; display:flex; align-items:center;
      justify-content:center; font-size:14px;
      border:3px solid white; box-shadow:0 2px 6px rgba(0,0,0,0.3);">
      &#x1F464;
    </div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16]
  });

  // ============================================================
  // TAMBAHKAN MARKER WATER STATIONS KE MAP
  // ============================================================
  const stationMarkers = waterStations.map((station, i) => {
    const marker = L.marker([station.lat, station.lng], { icon: stationIcon })
      .addTo(map)
      .bindPopup(`
        <div style="min-width:160px;">
          <strong style="color:#1D9E75;">${station.name}</strong><br/>
          <span style="font-size:12px;color:#666;">${station.addr}</span>
        </div>
      `);
    return { ...station, marker, index: i };
  });

  // ============================================================
  // STATE
  // ============================================================
  let userMarker     = null;
  let routingControl = null;
  let nearestMarkerRef = null;

  // ============================================================
  // FUNGSI UTAMA: cari stasiun terdekat menggunakan GPS live
  // ============================================================
  function findNearest() {
    const btn    = document.getElementById('btn-find');
    const status = document.getElementById('status');

    btn.disabled = true;
    status.textContent = 'Mengakses GPS...';

    if (!navigator.geolocation) {
      status.textContent = 'Browser tidak mendukung Geolocation.';
      btn.disabled = false;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;

        status.textContent = `Lokasi ditemukan: ${userLat.toFixed(5)}, ${userLng.toFixed(5)}`;
        btn.disabled = false;
        btn.textContent = 'Perbarui Lokasi';

        // Update marker pengguna
        if (userMarker) {
          userMarker.setLatLng([userLat, userLng]);
        } else {
          userMarker = L.marker([userLat, userLng], { icon: userIcon })
            .addTo(map)
            .bindPopup('<strong>Lokasi Anda</strong>')
            .openPopup();
        }

        // Hitung jarak ke setiap stasiun (Haversine formula)
        const distances = waterStations.map(s => ({
          ...s,
          dist: haversine(userLat, userLng, s.lat, s.lng)
        }));
        distances.sort((a, b) => a.dist - b.dist);
        const nearest = distances[0];

        // Reset icon semua station
        stationMarkers.forEach(sm => sm.marker.setIcon(stationIcon));

        // Highlight nearest station
        const nearestSM = stationMarkers.find(sm => sm.name === nearest.name);
        if (nearestSM) nearestSM.marker.setIcon(nearestIcon);

        // Tampilkan info box
        const infoBox  = document.getElementById('info-box');
        document.getElementById('info-name').textContent = nearest.name;
        document.getElementById('info-dist').textContent = `Jarak: ${(nearest.dist * 1000).toFixed(0)} meter`;
        document.getElementById('info-addr').textContent = nearest.addr;
        infoBox.style.display = 'block';

        // Hapus routing sebelumnya
        if (routingControl) {
          map.removeControl(routingControl);
          routingControl = null;
        }

        // Gambar rute terpendek ke stasiun terdekat (OSRM)
        routingControl = L.Routing.control({
          waypoints: [
            L.latLng(userLat, userLng),
            L.latLng(nearest.lat, nearest.lng)
          ],
          routeWhileDragging: false,
          addWaypoints: false,
          lineOptions: {
            styles: [{ color: '#1D9E75', weight: 5, opacity: 0.8 }]
          },
          createMarker: () => null, // gunakan marker custom kita
          show: false               // sembunyikan panel instruksi bawaan
        }).addTo(map);

        // Fit bounds agar user & station terlihat
        const bounds = L.latLngBounds(
          [userLat, userLng],
          [nearest.lat, nearest.lng]
        );
        map.fitBounds(bounds, { padding: [60, 60] });
      },
      (err) => {
        status.textContent = 'Gagal mendapatkan lokasi: ' + err.message;
        btn.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  // ============================================================
  // HAVERSINE — hitung jarak dua titik koordinat (km)
  // ============================================================
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2) ** 2
            + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2))
            * Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function toRad(deg) { return deg * Math.PI / 180; }
</script>

</body>
</html>
